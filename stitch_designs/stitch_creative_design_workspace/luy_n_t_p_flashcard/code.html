<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VocaEng - Flashcard Play</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&amp;family=Nunito:wght@700&amp;family=IBM+Plex+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#e1e3e4",
                        "on-secondary-fixed-variant": "#004395",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#003ea8",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "danger-bg": "#FEF2F2",
                        "surface": "#FFFFFF",
                        "tertiary-fixed-dim": "#ffb77d",
                        "primary-container": "#2563eb",
                        "primary-fixed-dim": "#b4c5ff",
                        "warning-bg": "#FFFBEB",
                        "ink": "#1A1D23",
                        "on-tertiary-fixed": "#2f1500",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#ffede1",
                        "primary": "#004ac6",
                        "on-secondary-container": "#fefcff",
                        "surface-bright": "#f8f9fa",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d9dadb",
                        "secondary": "#0058be",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "ink-soft": "#6B7280",
                        "on-surface-variant": "#434655",
                        "inverse-surface": "#2e3132",
                        "on-secondary-fixed": "#001a42",
                        "outline": "#737686",
                        "tertiary-fixed": "#ffdcc3",
                        "danger": "#DC2626",
                        "inverse-primary": "#b4c5ff",
                        "outline-variant": "#c3c6d7",
                        "secondary-container": "#2170e4",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "success-bg": "#ECFDF5",
                        "surface-container-lowest": "#ffffff",
                        "success": "#059669",
                        "on-surface": "#191c1d",
                        "blue-bg": "#EFF6FF",
                        "surface-container-low": "#f3f4f5",
                        "tertiary-container": "#a65900",
                        "surface-container": "#edeeef",
                        "tertiary": "#824500",
                        "on-primary-fixed": "#00174b",
                        "surface-variant": "#e1e3e4",
                        "secondary-fixed": "#d8e2ff",
                        "on-primary": "#ffffff",
                        "background": "#f8f9fa",
                        "surface-tint": "#0053db",
                        "surface-subtle": "#F1F3F5",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-primary-container": "#eeefff",
                        "on-background": "#191c1d"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        gutter: "16px",
                        unit: "4px",
                        "sidebar-width": "230px",
                        "margin-mobile": "16px",
                        "margin-desktop": "24px"
                    },
                    fontFamily: {
                        "body-lg": ["Work Sans"],
                        "headline-md": ["Work Sans"],
                        "display-brand": ["Nunito"],
                        "mono-data": ["IBM Plex Mono"],
                        "headline-lg-mobile": ["Work Sans"],
                        "headline-lg": ["Work Sans"],
                        "body-md": ["Work Sans"],
                        "label-sm": ["Work Sans"],
                        "headline-sm": ["Work Sans"]
                    },
                    fontSize: {
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "headline-md": ["22px", { lineHeight: "28px", fontWeight: "600" }],
                        "display-brand": ["48px", { lineHeight: "56px", fontWeight: "700" }],
                        "mono-data": ["13px", { lineHeight: "18px", fontWeight: "400" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "32px", fontWeight: "700" }],
                        "headline-lg": ["28px", { lineHeight: "36px", fontWeight: "700" }],
                        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "label-sm": ["12px", { lineHeight: "16px", fontWeight: "400" }],
                        "headline-sm": ["18px", { lineHeight: "24px", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .flashcard-container {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flashcard-container.flipped {
            transform: rotateY(180deg);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- TopAppBar (Generated from JSON) -->
<header class="bg-surface dark:bg-background text-primary dark:text-primary-fixed font-headline-sm text-headline-sm w-full top-0 flat no shadows flex justify-between items-center px-margin-mobile h-16 sticky z-10">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-200 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-bold flex-1 text-center">Greetings</h1>
<div class="flex">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-200 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="shuffle">shuffle</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-200 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col px-margin-mobile md:px-margin-desktop py-4 md:py-8 max-w-2xl mx-auto w-full gap-8">
<!-- Progress Section -->
<section class="bg-surface rounded-xl p-4 shadow-sm border border-surface-container-lowest flex items-center justify-between">
<div>
<h2 class="font-headline-sm text-headline-sm text-ink mb-1">Greetings</h2>
<p class="font-body-md text-body-md text-ink-soft">Hôm nay: 5 thẻ · 80%</p>
</div>
<div class="relative w-12 h-12 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 36 36">
<path class="text-surface-container-high" d="M18 2.0845
                         a 15.9155 15.9155 0 0 1 0 31.831
                         a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="100, 100" stroke-width="3"></path>
<path class="text-primary-container" d="M18 2.0845
                         a 15.9155 15.9155 0 0 1 0 31.831
                         a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="80, 100" stroke-width="3"></path>
</svg>
<span class="absolute text-label-sm font-label-sm font-bold text-primary-container">80%</span>
</div>
</section>
<!-- Flashcard Area -->
<section class="flex-1 flex flex-col items-center justify-center perspective-1000 w-full cursor-pointer group" onclick="this.querySelector('.flashcard-container').classList.toggle('flipped'); document.getElementById('review-actions').classList.toggle('opacity-50'); document.getElementById('review-actions').classList.toggle('pointer-events-none');">
<div class="flashcard-container relative w-full h-[400px] md:h-[450px] transform-style-3d w-full max-w-md mx-auto">
<!-- Front -->
<div class="absolute inset-0 bg-surface rounded-[18px] shadow-sm border border-surface-container flex flex-col items-center justify-center p-8 backface-hidden group-hover:shadow-md transition-shadow">
<button class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center rounded-full bg-blue-bg text-primary hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</button>
<div class="flex-1 flex flex-col items-center justify-center w-full">
<h2 class="text-display-brand font-display-brand text-primary mb-4 text-center">hello</h2>
<p class="font-mono-data text-mono-data text-ink-soft bg-surface-subtle px-3 py-1 rounded-md">/həˈloʊ/</p>
</div>
<div class="text-center mt-auto">
<p class="font-body-md text-body-md text-outline flex items-center gap-2 justify-center">
<span class="material-symbols-outlined text-[18px]" data-icon="touch_app">touch_app</span>
                            Chạm để lật thẻ
                        </p>
</div>
</div>
<!-- Back -->
<div class="absolute inset-0 bg-surface rounded-[18px] shadow-sm border border-primary-fixed flex flex-col items-center justify-center p-8 backface-hidden rotate-y-180">
<button class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center rounded-full bg-blue-bg text-primary hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</button>
<div class="flex-1 flex flex-col items-center w-full mt-8">
<div class="w-full text-center mb-6">
<p class="font-mono-data text-mono-data text-ink-soft mb-2">/həˈloʊ/</p>
<h3 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg-mobile md:font-headline-lg text-ink">xin chào</h3>
</div>
<div class="w-full text-left bg-surface-bright p-4 rounded-xl border border-surface-container-highest">
<p class="font-body-md text-body-md text-ink-soft mb-2 italic">"Hello, how are you today?"</p>
<p class="font-body-md text-body-md text-ink">"Xin chào, hôm nay bạn thế nào?"</p>
</div>
</div>
</div>
</div>
</section>
<!-- Navigation Context -->
<div class="flex justify-between items-center px-4 w-full max-w-md mx-auto">
<button class="flex items-center gap-2 text-primary font-body-md text-body-md hover:bg-blue-bg px-4 py-2 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
                 Câu trước
             </button>
<span class="font-body-md text-body-md text-outline">1 / 5</span>
<button class="flex items-center gap-2 text-primary font-body-md text-body-md hover:bg-blue-bg px-4 py-2 rounded-full transition-colors">
                 Câu sau
                 <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</main>
<!-- BottomNavBar (Generated from JSON - used here as Review Actions shell) -->
<nav class="bg-surface dark:bg-surface-container-lowest font-label-sm text-label-sm docked full-width bottom-0 rounded-t-xl shadow-lg bg-surface dark:bg-surface-container-lowest fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-24 px-2 pb-safe opacity-50 pointer-events-none transition-opacity duration-300" id="review-actions">
<button class="flex flex-col items-center justify-center text-ink-soft dark:text-on-surface-variant px-2 py-2 w-20 hover:bg-danger-bg rounded-xl transition-colors group">
<div class="w-10 h-10 rounded-full flex items-center justify-center text-danger bg-surface group-hover:bg-danger-bg shadow-sm border border-danger/10 mb-1">
<span class="material-symbols-outlined" data-icon="replay">replay</span>
</div>
<span class="text-danger font-medium">Lại quên</span>
</button>
<button class="flex flex-col items-center justify-center text-ink-soft dark:text-on-surface-variant px-2 py-2 w-20 hover:bg-warning-bg rounded-xl transition-colors group">
<div class="w-10 h-10 rounded-full flex items-center justify-center text-tertiary-container bg-surface group-hover:bg-warning-bg shadow-sm border border-tertiary-container/10 mb-1">
<span class="material-symbols-outlined" data-icon="sentiment_dissatisfied">sentiment_dissatisfied</span>
</div>
<span class="text-tertiary-container font-medium">Hơi khó</span>
</button>
<button class="flex flex-col items-center justify-center text-ink-soft dark:text-on-surface-variant px-2 py-2 w-20 hover:bg-blue-bg rounded-xl transition-colors group">
<div class="w-10 h-10 rounded-full flex items-center justify-center text-primary-container bg-surface group-hover:bg-blue-bg shadow-sm border border-primary-container/10 mb-1">
<span class="material-symbols-outlined" data-icon="sentiment_satisfied">sentiment_satisfied</span>
</div>
<span class="text-primary-container font-medium">Nhớ rồi</span>
</button>
<button class="flex flex-col items-center justify-center text-ink-soft dark:text-on-surface-variant px-2 py-2 w-20 hover:bg-success-bg rounded-xl transition-colors group">
<div class="w-10 h-10 rounded-full flex items-center justify-center text-success bg-surface group-hover:bg-success-bg shadow-sm border border-success/10 mb-1">
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</div>
<span class="text-success font-medium">Dễ ợt</span>
</button>
</nav>
</body></html>
