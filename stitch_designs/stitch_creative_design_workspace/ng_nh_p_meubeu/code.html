<body class="flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased text-on-surface">
<main class="w-full max-w-md">
<!-- Header Section -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/20 backdrop-blur-sm mb-4">
<span class="material-symbols-outlined text-white text-[32px]">menu_book</span>
</div>
<h1 class="font-display-brand text-[28px] leading-[36px] font-bold text-white mb-2">Chào mừng trở lại!</h1>
<p class="font-body-md text-body-md text-primary-fixed-dim">Đăng nhập để tiếp tục học</p>
</div>
<!-- Main Card -->
<div class="glass-card rounded-2xl p-6 md:p-8 shadow-2xl">
<form class="space-y-6">
<!-- Email Input -->
<div>
<label class="block font-body-md text-body-md text-on-surface mb-2" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-ink-soft">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-background border-none rounded-[10px] focus:ring-1.5 focus:ring-primary focus:outline-none font-body-md text-body-md text-on-surface placeholder:text-ink-soft transition-shadow" id="email" name="email" placeholder="Nhập địa chỉ email của bạn" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-body-md text-body-md text-on-surface" for="password">Mật khẩu</label>
<a class="font-body-md text-body-md text-primary hover:text-secondary transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-ink-soft">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-background border-none rounded-[10px] focus:ring-1.5 focus:ring-primary focus:outline-none font-body-md text-body-md text-on-surface placeholder:text-ink-soft transition-shadow" id="password" name="password" placeholder="Nhập mật khẩu" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-soft hover:text-ink focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-3.5 px-4 bg-gradient-to-r from-primary to-secondary text-white font-headline-sm text-headline-sm rounded-[12px] hover:opacity-90 active:scale-[0.98] transition-all shadow-md" type="submit">
                    Đăng nhập
                </button>
</form>
<!-- Social Login Divider -->
<div class="mt-6 flex items-center justify-center space-x-4">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-body-md text-body-md text-ink-soft">hoặc</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<!-- Social Login Buttons -->
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-2.5 px-4 border border-outline-variant rounded-[10px] hover:bg-surface-subtle transition-colors">
<img class="w-5 h-5 mr-2" data-alt="A small icon representing the Google logo. The design is clean and minimalist, suitable for a light-mode educational app UI. The icon is isolated on a transparent background, ensuring it blends seamlessly with the surrounding interface elements." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0HA7eTgZaqaHxm1Otrvph-gGypow_8eHDafsdOnfYF4df-GeEvZLY32BUG4AbDwlteUIVZR5nRPy8YFPDxlNXMYgvHaHP-h9FfRA6OOasUq1hJ6GqhRoqtLz-3NSHrAOSupVa2YJdiww5504vA9Pf07bWKA06fXjperH4OC9YrKGSajubkLR9xnLiKgPJvymGuWV7h5BoBuafetDON4gZj7zHklMDHhyPsncmXdxvMYVOzONxmaUV0IL3Vwz2K3V_E9UayWhIM7g"/>
<span class="font-body-md text-body-md text-on-surface font-medium">Google</span>
</button>
<button class="flex items-center justify-center py-2.5 px-4 border border-outline-variant rounded-[10px] hover:bg-surface-subtle transition-colors">
<span class="material-symbols-outlined mr-2" data-weight="fill">apps</span>
<span class="font-body-md text-body-md text-on-surface font-medium">Apple</span>
</button>

            Chưa có tài khoản? <a class="text-white font-semibold hover:underline" href="#">Đăng ký</a>
</p>

<script>
        // Simple password toggle logic
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        });
    </script>
