<body class="bg-background text-on-background min-h-screen font-body-md">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface dark:bg-on-background z-40">
<div class="flex items-center justify-between px-margin-mobile h-14 w-full">
<button aria-label="Go back" class="flex items-center justify-center text-primary dark:text-primary-fixed hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors active:scale-95 duration-150 rounded-full p-2 -ml-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-brand text-headline-md text-primary dark:text-primary-fixed truncate px-4">VocaEng</h1>
<button aria-label="Account" class="flex items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors active:scale-95 duration-150 rounded-full p-2 -mr-2">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto px-margin-mobile py-6 flex flex-col gap-6 pb-24 md:pb-8">
<div class="flex flex-col gap-2 mb-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-ink">Add New Word</h2>
<p class="font-body-md text-body-md text-ink-soft">Expand your vocabulary journey.</p>
</div>
<form class="flex flex-col gap-6">
<!-- Word Input (Required) -->
<div class="flex flex-col gap-2">
<label class="font-headline-sm text-headline-sm text-ink flex items-center gap-1" for="word">
                    Word <span class="text-danger">*</span>
</label>
<div class="relative">
<input class="w-full bg-surface-bright border-transparent focus:border-primary focus:ring-0 rounded-[10px] py-3 px-4 text-ink placeholder:text-ink-soft font-body-lg text-body-lg transition-colors shadow-sm outline-none border border-surface-container-high" id="word" name="word" placeholder="e.g., Ubiquitous" required="" type="text"/>
</div>
</div>
<!-- Meaning Input (Required) -->
<div class="flex flex-col gap-2">
<label class="font-headline-sm text-headline-sm text-ink flex items-center gap-1" for="meaning">
                    Meaning <span class="text-danger">*</span>
</label>
<div class="relative">
<textarea class="w-full bg-surface-bright border-transparent focus:border-primary focus:ring-0 rounded-[10px] py-3 px-4 text-ink placeholder:text-ink-soft font-body-lg text-body-lg transition-colors shadow-sm outline-none border border-surface-container-high resize-none" id="meaning" name="meaning" placeholder="Definition in your own words..." required="" rows="3"></textarea>
</div>
</div>
<!-- Example Input (Optional) -->
<div class="flex flex-col gap-2">
<label class="font-headline-sm text-headline-sm text-ink" for="example">
                    Example Sentence <span class="text-ink-soft font-body-md text-body-md ml-1 font-normal">(Optional)</span>
</label>
<div class="relative">
<textarea class="w-full bg-surface-bright border-transparent focus:border-primary focus:ring-0 rounded-[10px] py-3 px-4 text-ink placeholder:text-ink-soft font-body-lg text-body-lg transition-colors shadow-sm outline-none border border-surface-container-high resize-none" id="example" name="example" placeholder="How is it used in a sentence?" rows="2"></textarea>
</div>
</div>
<!-- Topic Selection (Chips) -->
<div class="flex flex-col gap-3">
<label class="font-headline-sm text-headline-sm text-ink">
                    Topic Tag
                </label>
<div class="flex flex-wrap gap-2">
<!-- Selected State -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="topic" type="radio" value="academic"/>
<div class="px-4 py-2 rounded-full border border-primary bg-blue-bg text-primary font-label-sm text-label-sm font-semibold transition-all peer-checked:bg-primary peer-checked:text-surface peer-checked:border-primary">
                            Academic
                        </div>
</label>
<!-- Unselected State -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="topic" type="radio" value="daily"/>
<div class="px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-container-low transition-all peer-checked:bg-primary peer-checked:text-surface peer-checked:border-primary">
                            Daily Life
                        </div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="topic" type="radio" value="business"/>
<div class="px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-container-low transition-all peer-checked:bg-primary peer-checked:text-surface peer-checked:border-primary">
                            Business
                        </div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="topic" type="radio" value="travel"/>
<div class="px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-container-low transition-all peer-checked:bg-primary peer-checked:text-surface peer-checked:border-primary">
                            Travel
                        </div>
</label>
<button class="px-4 py-2 rounded-full border border-dashed border-outline text-ink-soft font-label-sm text-label-sm flex items-center gap-1 hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span> New
                    </button>
</div>
</div>
<!-- Save Action -->
<div class="mt-4 pb-4">
<button class="w-full bg-primary text-surface font-headline-sm text-headline-sm py-4 rounded-[12px] shadow-sm hover:bg-on-primary-fixed-variant active:scale-98 transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined icon-fill" data-icon="save">save</span>
                    Save Word
                </button>
</div>
</form>
</main>
