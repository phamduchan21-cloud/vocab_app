</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop relative z-10 pb-12">
<div class="glass-panel w-full max-w-md rounded-[24px] p-8 flex flex-col gap-8 animate-fade-in-up">
<!-- Step Indicator -->
<div class="flex items-center justify-center gap-3">
<div class="w-10 h-1.5 rounded-full bg-primary transition-all duration-300"></div>
<div class="w-10 h-1.5 rounded-full bg-surface-variant transition-all duration-300"></div>
<div class="w-10 h-1.5 rounded-full bg-surface-variant transition-all duration-300"></div>
</div>
<!-- Header -->

<div class="w-16 h-16 rounded-2xl bg-blue-bg flex items-center justify-center mb-2">

</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-ink">Quên mật khẩu?</h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                    Đừng lo lắng! Hãy nhập email liên kết với tài khoản của bạn để nhận mã khôi phục an toàn.
                </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-6">
<div class="flex flex-col gap-2 relative">
<label class="font-label-sm text-label-sm text-ink-soft pl-1" for="email">Địa chỉ Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface border border-outline-variant rounded-xl pl-12 pr-4 py-3.5 font-body-md text-body-md text-ink placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="email" placeholder="ví dụ: hocvien@meubeu.com" type="email"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-4 rounded-xl hover:bg-primary-container active:scale-[0.98] transition-all shadow-md flex justify-center items-center gap-2 group mt-2" type="button">
<span>Gửi mã xác nhận</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>

<div class="flex justify-center mt-2">
<a class="inline-flex items-center gap-2 text-primary font-body-md text-body-md font-medium hover:text-primary-container transition-colors p-2 rounded-lg hover:bg-blue-bg/50" href="#">
<span class="material-symbols-outlined text-[18px]">keyboard_backspace</span>
<span>Quay lại Đăng nhập</span>

<script>
        // Micro-interaction for input focus state simulation if needed, 
        // Tailwind handles most of it, but keeping structure ready.
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            if(emailInput) {
                emailInput.focus();
            }
        });
    </script>
