<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quiz Play - VocaEng</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&amp;family=Nunito:wght@700&amp;family=Work+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#191c1d",
                        "tertiary-container": "#a65900",
                        "surface-dim": "#d9dadb",
                        "on-primary-container": "#eeefff",
                        "surface-container-low": "#f3f4f5",
                        "warning-bg": "#FFFBEB",
                        "success-bg": "#ECFDF5",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-fixed": "#2f1500",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "primary-container": "#2563eb",
                        "surface-subtle": "#F1F3F5",
                        "primary-fixed": "#dbe1ff",
                        "danger-bg": "#FEF2F2",
                        "primary": "#004ac6",
                        "on-primary-fixed-variant": "#003ea8",
                        "ink-soft": "#6B7280",
                        "inverse-surface": "#2e3132",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#ffede1",
                        "on-surface-variant": "#434655",
                        "on-secondary-fixed-variant": "#004395",
                        "surface": "#FFFFFF",
                        "secondary": "#0058be",
                        "surface-container-highest": "#e1e3e4",
                        "tertiary": "#824500",
                        "secondary-fixed": "#d8e2ff",
                        "on-tertiary": "#ffffff",
                        "on-background": "#191c1d",
                        "on-secondary-container": "#fefcff",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "error": "#ba1a1a",
                        "background": "#f8f9fa",
                        "tertiary-fixed-dim": "#ffb77d",
                        "on-error-container": "#93000a",
                        "ink": "#1A1D23",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-error": "#ffffff",
                        "surface-tint": "#0053db",
                        "on-secondary-fixed": "#001a42",
                        "danger": "#DC2626",
                        "tertiary-fixed": "#ffdcc3",
                        "secondary-container": "#2170e4",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-secondary": "#ffffff",
                        "blue-bg": "#EFF6FF",
                        "success": "#059669",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary-fixed": "#00174b",
                        "error-container": "#ffdad6",
                        "surface-container": "#edeeef",
                        "surface-container-high": "#e7e8e9",
                        "outline-variant": "#c3c6d7",
                        "inverse-primary": "#b4c5ff",
                        "outline": "#737686"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "margin-mobile": "16px",
                        "sidebar-width": "230px",
                        "margin-desktop": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Work Sans"],
                        "headline-lg-mobile": ["Work Sans"],
                        "display-brand": ["Nunito"],
                        "headline-md": ["Work Sans"],
                        "headline-sm": ["Work Sans"],
                        "headline-lg": ["Work Sans"],
                        "mono-data": ["IBM Plex Mono"],
                        "body-md": ["Work Sans"],
                        "body-lg": ["Work Sans"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "display-brand": ["48px", { "lineHeight": "56px", "fontWeight": "700" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "mono-data": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col font-body-md">
<!-- TopAppBar (From JSON) -->
<header class="bg-surface w-full top-0 sticky flex items-center justify-between px-4 h-16 z-20">
<button class="text-on-surface-variant hover:bg-surface-subtle transition-transform active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-display-brand text-headline-md text-primary">VocaEng (MeuBeu)</h1>
<button class="text-on-surface-variant hover:bg-surface-subtle transition-transform active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<!-- Navigation Shell suppressed due to transactional/task-focused nature of Quiz Play -->
<main class="flex-1 w-full max-w-2xl mx-auto px-margin-mobile md:px-margin-desktop py-6 flex flex-col relative">
<!-- Progress Section -->
<section class="mb-8 animate-[fadeIn_0.3s_ease-out]">
<div class="flex justify-between items-end mb-3">
<div>
<span class="font-headline-sm text-headline-sm text-on-surface">Câu 3/10</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-surface rounded-full shadow-sm border border-surface-variant">
<span class="material-symbols-outlined text-[18px] text-tertiary-container" data-icon="timer">timer</span>
<span class="font-mono-data text-mono-data text-tertiary-container font-bold tracking-widest">12:45</span>
</div>
</div>
<!-- Progress Bar Track -->
<div class="w-full h-2.5 bg-surface-container-highest rounded-full overflow-hidden shadow-inner">
<!-- Progress Bar Fill -->
<div class="h-full bg-primary w-[30%] rounded-full transition-all duration-500 ease-in-out relative overflow-hidden">
<!-- Shimmer effect on progress bar -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full animate-[shimmer_2s_infinite]"></div>
</div>
</div>
</section>
<!-- Question Card -->
<section class="mb-8">
<div class="bg-surface rounded-2xl md:rounded-[24px] p-8 md:p-12 shadow-[0_4px_24px_rgba(26,29,35,0.06)] border border-surface-variant flex flex-col items-center justify-center min-h-[200px] relative overflow-hidden">
<!-- Decorative subtle background element -->
<div class="absolute -right-8 -top-8 w-32 h-32 bg-primary-fixed rounded-full opacity-20 blur-2xl"></div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface text-center z-10 leading-snug">
                    Nghĩa của từ <br class="md:hidden"/>
<span class="text-primary inline-block mt-2 md:mt-0 px-4 py-1 bg-blue-bg rounded-xl border border-primary-fixed-dim">hello</span> <br class="md:hidden"/>
                    là gì?
                </h2>
</div>
</section>
<!-- Options Grid -->
<section class="flex flex-col gap-3.5 mb-24">
<!-- Option A (Unselected) -->
<button class="group w-full bg-surface border-2 border-surface-variant hover:border-outline-variant hover:bg-surface-subtle transition-all duration-200 rounded-[16px] p-4 flex items-center gap-4 text-left shadow-sm active:scale-[0.98]">
<div class="w-10 h-10 rounded-xl bg-surface-container-high group-hover:bg-outline-variant transition-colors flex items-center justify-center font-headline-sm text-headline-sm text-on-surface-variant flex-shrink-0">
                    A
                </div>
<span class="font-body-lg text-body-lg text-on-surface flex-1">Tạm biệt</span>
</button>
<!-- Option B (Selected/Active) -->
<button class="w-full bg-blue-bg border-2 border-primary rounded-[16px] p-4 flex items-center justify-between shadow-[0_4px_16px_rgba(0,74,198,0.15)] ring-4 ring-primary/10 transition-all duration-200 active:scale-[0.98]">
<div class="flex items-center gap-4 flex-1">
<div class="w-10 h-10 rounded-xl bg-primary shadow-sm flex items-center justify-center font-headline-sm text-headline-sm text-on-primary flex-shrink-0">
                        B
                    </div>
<span class="font-body-lg text-body-lg text-primary font-bold">Xin chào</span>
</div>
<span class="material-symbols-outlined text-[28px] text-primary drop-shadow-sm flex-shrink-0" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option C (Unselected) -->
<button class="group w-full bg-surface border-2 border-surface-variant hover:border-outline-variant hover:bg-surface-subtle transition-all duration-200 rounded-[16px] p-4 flex items-center gap-4 text-left shadow-sm active:scale-[0.98]">
<div class="w-10 h-10 rounded-xl bg-surface-container-high group-hover:bg-outline-variant transition-colors flex items-center justify-center font-headline-sm text-headline-sm text-on-surface-variant flex-shrink-0">
                    C
                </div>
<span class="font-body-lg text-body-lg text-on-surface flex-1">Cảm ơn</span>
</button>
<!-- Option D (Unselected) -->
<button class="group w-full bg-surface border-2 border-surface-variant hover:border-outline-variant hover:bg-surface-subtle transition-all duration-200 rounded-[16px] p-4 flex items-center gap-4 text-left shadow-sm active:scale-[0.98]">
<div class="w-10 h-10 rounded-xl bg-surface-container-high group-hover:bg-outline-variant transition-colors flex items-center justify-center font-headline-sm text-headline-sm text-on-surface-variant flex-shrink-0">
                    D
                </div>
<span class="font-body-lg text-body-lg text-on-surface flex-1">Xin lỗi</span>
</button>
</section>
<!-- Footer Actions (Fixed at bottom for easy reach on mobile, relative on desktop) -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-background via-background to-transparent pt-12 pb-6 px-margin-mobile md:static md:bg-none md:p-0 mt-auto z-10">
<div class="max-w-2xl mx-auto flex gap-4 w-full">
<button class="flex-1 py-4 px-2 rounded-[16px] bg-surface border-2 border-surface-variant text-on-surface font-headline-sm text-headline-sm hover:bg-surface-subtle hover:border-outline-variant active:scale-[0.97] transition-all flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="chevron_left">chevron_left</span>
<span class="hidden sm:inline">Câu trước</span>
<span class="sm:hidden">Trước</span>
</button>
<button class="flex-[2] py-4 px-6 rounded-[16px] bg-primary text-on-primary font-headline-sm text-headline-sm hover:bg-surface-tint active:scale-[0.97] transition-all shadow-[0_6px_20px_rgba(0,74,198,0.3)] flex justify-center items-center gap-2">
<span>Câu tiếp theo</span>
<span class="material-symbols-outlined text-[20px]" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
</main>
<!-- Inline styles for custom micro-animations -->
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</body></html>
