<!-- Suppressed Shell: Linear/Transactional Page (Sign-up) -->

                MeuBeu
            </h1>

<div class="mb-8 text-center">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-ink mb-2">Tạo tài khoản mới</h2>
<p class="font-body-md text-body-md text-ink-soft">Bắt đầu hành trình chinh phục ngoại ngữ cùng Meu</p>
</div>
<form class="space-y-5">
<!-- Username -->
<div>
<label class="block font-label-sm text-label-sm text-ink mb-1.5 ml-1" for="username">Tên người dùng</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-ink-soft" data-icon="person">person</span>
<input class="w-full bg-background border border-surface-variant rounded-[10px] py-3 pl-10 pr-4 font-body-md text-body-md text-ink focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-ink-soft" id="username" name="username" placeholder="Nhập tên của bạn" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-sm text-label-sm text-ink mb-1.5 ml-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-ink-soft" data-icon="mail">mail</span>
<input class="w-full bg-background border border-surface-variant rounded-[10px] py-3 pl-10 pr-4 font-body-md text-body-md text-ink focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-ink-soft" id="email" name="email" placeholder="example@email.com" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label-sm text-label-sm text-ink mb-1.5 ml-1" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-ink-soft" data-icon="lock">lock</span>
<input class="w-full bg-background border border-surface-variant rounded-[10px] py-3 pl-10 pr-10 font-body-md text-body-md text-ink focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-ink-soft" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-soft hover:text-ink transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-label-sm text-label-sm text-ink mb-1.5 ml-1" for="confirm-password">Xác nhận mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-ink-soft" data-icon="lock_reset">lock_reset</span>
<input class="w-full bg-background border border-surface-variant rounded-[10px] py-3 pl-10 pr-10 font-body-md text-body-md text-ink focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-ink-soft" id="confirm-password" name="confirm-password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-soft hover:text-ink transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>

<button class="w-full gradient-btn text-on-primary font-headline-sm text-headline-sm py-3.5 rounded-[12px] shadow-sm flex items-center justify-center gap-2 mt-2" type="submit">
                    Đăng ký
