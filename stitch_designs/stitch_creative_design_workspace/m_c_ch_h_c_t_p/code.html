<style>
        .chip-selected {
            background-color: theme('colors.blue-bg');
            border-color: theme('colors.primary');
        }
        .chip-selected .material-symbols-outlined {
            color: theme('colors.primary');
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md antialiased overflow-x-hidden">
<!-- Top App Bar (Modified for Onboarding) -->
<header class="w-full top-0 left-0 bg-background flex items-center justify-between px-margin-mobile md:px-margin-desktop py-4 z-50">
<button aria-label="Back" class="material-symbols-outlined text-on-surface-variant hover:opacity-80 scale-95 active:scale-90 transition-transform p-2 -ml-2 rounded-full">arrow_back</button>
<!-- Progress Bar -->
<div class="flex-1 max-w-[200px] mx-4 h-2 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 60%;"></div>
</div>
<div class="w-10"></div> <!-- Spacer for alignment -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-margin-mobile md:px-margin-desktop py-8 md:py-12 max-w-2xl mx-auto w-full">
<div class="text-center mb-10 md:mb-12">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-4">Tại sao bạn muốn học ngôn ngữ này?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Chọn một hoặc nhiều mục tiêu để chúng tôi cá nhân hóa lộ trình cho bạn.</p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-auto">
<button class="chip-option flex items-center p-4 bg-surface rounded-[12px] border-2 border-transparent shadow-sm hover:shadow transition-all duration-200 text-left group" data-value="career">
<div class="w-12 h-12 rounded-[14px] bg-blue-bg flex items-center justify-center mr-4 group-[.chip-selected]:bg-primary group-[.chip-selected]:text-surface transition-colors">
<span class="material-symbols-outlined text-[28px] text-primary group-[.chip-selected]:text-surface">work</span>
</div>
<div class="flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Sự nghiệp</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Nâng cao cơ hội thăng tiến</p>
</div>
</button>
<button class="chip-option flex items-center p-4 bg-surface rounded-[12px] border-2 border-transparent shadow-sm hover:shadow transition-all duration-200 text-left group" data-value="travel">
<div class="w-12 h-12 rounded-[14px] bg-blue-bg flex items-center justify-center mr-4 group-[.chip-selected]:bg-primary group-[.chip-selected]:text-surface transition-colors">
<span class="material-symbols-outlined text-[28px] text-primary group-[.chip-selected]:text-surface">flight</span>
</div>
<div class="flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Du lịch</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Giao tiếp khi đi nước ngoài</p>
</div>
</button>
<button class="chip-option flex items-center p-4 bg-surface rounded-[12px] border-2 border-transparent shadow-sm hover:shadow transition-all duration-200 text-left group" data-value="exams">
<div class="w-12 h-12 rounded-[14px] bg-blue-bg flex items-center justify-center mr-4 group-[.chip-selected]:bg-primary group-[.chip-selected]:text-surface transition-colors">
<span class="material-symbols-outlined text-[28px] text-primary group-[.chip-selected]:text-surface">school</span>
</div>
<div class="flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Thi cử</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Chứng chỉ &amp; Học thuật</p>
</div>
</button>
<button class="chip-option flex items-center p-4 bg-surface rounded-[12px] border-2 border-transparent shadow-sm hover:shadow transition-all duration-200 text-left group" data-value="entertainment">
<div class="w-12 h-12 rounded-[14px] bg-blue-bg flex items-center justify-center mr-4 group-[.chip-selected]:bg-primary group-[.chip-selected]:text-surface transition-colors">
<span class="material-symbols-outlined text-[28px] text-primary group-[.chip-selected]:text-surface">movie</span>
</div>
<div class="flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Giải trí</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Phim, nhạc, sách báo</p>
</div>
</button>
<button class="chip-option flex items-center p-4 bg-surface rounded-[12px] border-2 border-transparent shadow-sm hover:shadow transition-all duration-200 text-left group sm:col-span-2" data-value="hobby">
<div class="w-12 h-12 rounded-[14px] bg-blue-bg flex items-center justify-center mr-4 group-[.chip-selected]:bg-primary group-[.chip-selected]:text-surface transition-colors">
<span class="material-symbols-outlined text-[28px] text-primary group-[.chip-selected]:text-surface">favorite</span>
</div>
<div class="flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Sở thích</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Đam mê &amp; Phát triển bản thân</p>
</div>
</button>
</div>
</main>
<!-- Bottom Action Area -->
<div class="w-full bg-surface-bright px-margin-mobile md:px-margin-desktop py-6 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] mt-auto sticky bottom-0">
<div class="max-w-2xl mx-auto w-full flex flex-col">
<button class="w-full bg-surface-container text-outline font-headline-sm text-headline-sm py-4 rounded-[12px] transition-all duration-300 pointer-events-none opacity-60" id="nextBtn">
                Tiếp tục
            </button>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const options = document.querySelectorAll('.chip-option');
            const nextBtn = document.getElementById('nextBtn');
            let selectedCount = 0;

            options.forEach(option => {
                option.addEventListener('click', () => {
                    option.classList.toggle('chip-selected');
                    
                    if (option.classList.contains('chip-selected')) {
                        selectedCount++;
                    } else {
                        selectedCount--;
                    }

                    if (selectedCount > 0) {
                        nextBtn.classList.remove('bg-surface-container', 'text-outline', 'pointer-events-none', 'opacity-60');
                        nextBtn.classList.add('bg-primary', 'text-on-primary', 'hover:opacity-90', 'active:scale-[0.98]');
                    } else {
                        nextBtn.classList.add('bg-surface-container', 'text-outline', 'pointer-events-none', 'opacity-60');
                        nextBtn.classList.remove('bg-primary', 'text-on-primary', 'hover:opacity-90', 'active:scale-[0.98]');
                    }
                });
            });
        });
    </script>
</body></html>
