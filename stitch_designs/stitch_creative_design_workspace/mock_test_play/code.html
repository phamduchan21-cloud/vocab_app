<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Mock Test Playing Interface</title>

                      "inverse-surface": "#2e3132",
                      "secondary-container": "#2170e4",
                      "on-tertiary-container": "#ffede1",
                      "error": "#ba1a1a",
                      "surface-variant": "#e1e3e4",
                      "secondary": "#0058be",
                      "outline-variant": "#c3c6d7",
                      "on-secondary": "#ffffff",
                      "on-background": "#191c1d",
                      "tertiary-container": "#a65900",

                      "on-error-container": "#93000a",

                      "surface-container-highest": "#e1e3e4",

                      "surface-container-lowest": "#ffffff",

                      "surface-container-low": "#f3f4f5",

                      "surface-bright": "#f8f9fa",

                      "danger": "#DC2626",
                      "primary-fixed": "#dbe1ff",
                      "secondary-fixed": "#d8e2ff",
                      "error-container": "#ffdad6",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg text-body-lg">
<!-- Header (Custom Transactional) -->
<header class="bg-surface sticky top-0 w-full z-50 px-4 h-16 flex items-center justify-between">
<div class="flex items-center gap-4 w-1/3">
<button aria-label="Back to home" class="p-2 hover:bg-surface-subtle rounded-full transition-colors flex items-center gap-2 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
<span class="hidden md:inline font-headline-sm text-headline-sm">Trang chủ</span>
</button>
</div>
<div class="flex-1 flex flex-col items-center justify-center">
<h1 class="font-headline-md text-headline-md text-on-surface">Mini-test</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant">Bài kiểm tra 20 câu</p>
</div>
<div class="w-1/3 flex justify-end">
<div class="bg-danger-bg text-danger px-3 py-1 rounded-full flex items-center gap-1 font-mono-data text-mono-data">
<span class="material-symbols-outlined text-[16px]">timer</span>
<span>25:00</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 max-w-4xl w-full mx-auto p-margin-mobile md:p-margin-desktop flex flex-col gap-6 relative">
<!-- Question Navigation Grid -->
<section aria-label="Question Navigation" class="bg-surface rounded-xl p-4 shadow-sm">
<div class="flex overflow-x-auto gap-2 pb-2 hide-scrollbar">
<!-- Example states: Answered (success-bg), Seen (blue-bg), Unseen (surface-container-low) -->
<button class="w-10 h-10 shrink-0 rounded-lg bg-success-bg text-success border border-success flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95">1</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-success-bg text-success border border-success flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95">2</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-primary text-on-primary flex items-center justify-center font-headline-sm text-headline-sm shadow-md transition-transform active:scale-95 ring-2 ring-primary-fixed-dim ring-offset-2 ring-offset-surface">3</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-blue-bg text-primary border border-primary-fixed-dim flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95">4</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-surface-container-low text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95 hover:bg-surface-variant">5</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-surface-container-low text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95 hover:bg-surface-variant">6</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-surface-container-low text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95 hover:bg-surface-variant">7</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-surface-container-low text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95 hover:bg-surface-variant">8</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-surface-container-low text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95 hover:bg-surface-variant">9</button>
<button class="w-10 h-10 shrink-0 rounded-lg bg-surface-container-low text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm transition-transform active:scale-95 hover:bg-surface-variant">10</button>
<!-- ... More numbers -->
</div>
<!-- Legend -->
<div class="flex items-center gap-4 mt-3 text-label-sm font-label-sm text-on-surface-variant justify-center flex-wrap">
<div class="flex items-center gap-1.5">
<div class="w-3 h-3 rounded-sm bg-success-bg border border-success"></div>
<span>Đã làm</span>
</div>
<div class="flex items-center gap-1.5">
<div class="w-3 h-3 rounded-sm bg-primary border border-primary"></div>
<span>Đang xem</span>
</div>
<div class="flex items-center gap-1.5">
<div class="w-3 h-3 rounded-sm bg-blue-bg border border-primary-fixed-dim"></div>
<span>Đã xem</span>
</div>
<div class="flex items-center gap-1.5">
<div class="w-3 h-3 rounded-sm bg-surface-container-low border border-transparent"></div>
<span>Chưa xem</span>
</div>
</div>
</section>
<!-- Current Question Card -->
<section class="bg-surface rounded-xl p-6 shadow-sm flex flex-col gap-6 min-h-[400px]">
<header class="flex justify-between items-start border-b border-surface-variant pb-4">
<h2 class="font-headline-sm text-headline-sm text-primary">Câu 3 / 20</h2>
<button aria-label="Flag question" class="text-on-surface-variant hover:bg-surface-subtle p-2 rounded-full transition-colors">
<span class="material-symbols-outlined">flag</span>
</button>
</header>
<div class="flex-1 flex flex-col gap-8">
<!-- Question Text -->
<div class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface leading-tight">
                    What does 'resilient' mean?
                </div>
<!-- Multiple Choice Options -->
<div class="flex flex-col gap-3">
<!-- Option A (Selected) -->
<button aria-pressed="true" class="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-primary bg-blue-bg text-left transition-all active:scale-[0.99]">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-headline-sm text-headline-sm shrink-0">A</div>
<span class="font-body-lg text-body-lg text-on-surface flex-1">Kiên cường</span>
</button>
<!-- Option B -->
<button aria-pressed="false" class="w-full flex items-center gap-4 p-4 rounded-xl border border-outline-variant bg-surface hover:bg-surface-subtle text-left transition-all active:scale-[0.99]">
<div class="w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm shrink-0">B</div>
<span class="font-body-lg text-body-lg text-on-surface flex-1">Hoãn lại</span>
</button>
<!-- Option C -->
<button aria-pressed="false" class="w-full flex items-center gap-4 p-4 rounded-xl border border-outline-variant bg-surface hover:bg-surface-subtle text-left transition-all active:scale-[0.99]">
<div class="w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm shrink-0">C</div>
<span class="font-body-lg text-body-lg text-on-surface flex-1">Chân thật</span>
</button>
<!-- Option D -->
<button aria-pressed="false" class="w-full flex items-center gap-4 p-4 rounded-xl border border-outline-variant bg-surface hover:bg-surface-subtle text-left transition-all active:scale-[0.99]">
<div class="w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant flex items-center justify-center font-headline-sm text-headline-sm shrink-0">D</div>
<span class="font-body-lg text-body-lg text-on-surface flex-1">Kết quả</span>
</button>
</div>
</div>
</section>
<!-- Footer Buttons (Fixed on mobile, inline on desktop) -->
<footer class="mt-auto pt-6 flex flex-col md:flex-row gap-4 items-center justify-between pb-safe">
<div class="flex gap-4 w-full md:w-auto">
<button class="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3 rounded-lg border border-outline-variant text-on-surface hover:bg-surface-subtle transition-colors active:scale-98 font-headline-sm text-headline-sm">
<span class="material-symbols-outlined">chevron_left</span>
                    Câu trước
                </button>
<button class="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3 rounded-lg border border-outline-variant text-on-surface hover:bg-surface-subtle transition-colors active:scale-98 font-headline-sm text-headline-sm">
                    Câu sau
                    <span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<button class="w-full md:w-auto px-8 py-3 rounded-lg bg-primary text-on-primary hover:bg-surface-tint transition-colors active:scale-98 font-headline-sm text-headline-sm shadow-sm flex justify-center items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                Nộp bài
            </button>
</footer>
</main>
<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</body></html>
