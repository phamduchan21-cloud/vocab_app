name: Deploy frontend to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

concurrency:
  group: vercel-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Test backend
        working-directory: backend
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pytest

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Check Flutter
        working-directory: frontend
        run: |
          flutter pub get
          flutter analyze --fatal-infos
          flutter test

      - name: Build Flutter web
        working-directory: frontend
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          if [ -z "${API_BASE_URL}" ]; then
            echo "Missing GitHub Environment variable: API_BASE_URL"
            exit 1
          fi
          flutter build web --release \
            --dart-define=API_BASE_URL="${API_BASE_URL}"

      - name: Install pinned Vercel CLI
        run: npm install --global vercel@56.5.0

      - name: Pull Vercel project settings
        working-directory: frontend
        run: >-
          vercel pull --yes
          --environment=${{ inputs.environment }}
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifact
        working-directory: frontend
        run: >-
          vercel build
          ${{ inputs.environment == 'production' && '--prod' || '' }}
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact
        working-directory: frontend
        run: >-
          vercel deploy --prebuilt
          ${{ inputs.environment == 'production' && '--prod' || '' }}
          --token=${{ secrets.VERCEL_TOKEN }}
